<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Phishing Shield PRO</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body class="dark-core">
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-header">
                <span class="pulse-icon"></span>
                <h3>Scan History</h3>
            </div>
            <div class="history-list" id="scanHistory"></div>
            <button class="action-link" onclick="clearHistory()">Clear All Records</button>
        </aside>

        <main class="workspace">
            <div class="hero-header">
                <div class="badge-row">
                    <span class="status-tag">SYSTEM ACTIVE</span>
                    <span class="status-tag">HYBRID CNN-XAI</span>
                </div>
                <h1>Phishing Email Detector</h1>
                <p>Real-time neural pattern recognition for email security</p>
            </div>

            <div class="main-card">
                <div class="card-meta">
                    <span id="wordCount">0 words</span>
                    <span id="charCount">0 characters</span>
                </div>
                
                <div class="input-container">
                    <div id="highlightLayer" class="highlight-layer"></div>
                    
                    <textarea id="emailText" 
                              oninput="handleInput()" 
                              onscroll="syncScroll()" 
                              placeholder="Paste your email content here..."></textarea>
                    
                    <div id="scanLaser" class="laser hidden"></div>
                </div>

                <div class="control-row">
                    <button id="scanBtn" onclick="initiateDeepScan()" class="btn-primary">Analyze the E-Mail</button>
                    <button onclick="resetDashboard()" class="btn-secondary">Reset System</button>
                </div>
            </div>

            <div id="resultPanel" class="result-panel hidden">
                <div class="panel-top">
                    <div class="verdict-box">
                        <small>Detection Verdict</small>
                        <h2 id="verdict">Checking...</h2>
                    </div>
                    <div class="score-box">
                        <small>Threat Probability</small>
                        <h2 id="percent">0%</h2>
                    </div>
                </div>

                <div class="risk-track">
                    <div id="riskFill" class="risk-fill"></div>
                </div>

                <div class="insight-grid">
                    <div class="insight-card">
                        <label>AI Reasoning & XAI Triggers</label>
                        <p id="reasoning">Awaiting input...</p>
                    </div>
                    <div class="insight-card">
                        <label>Response Protocol</label>
                        <p id="action">Standby...</p>
                    </div>
                </div>

                <div class="panel-footer">
                    <div class="tech-stats">
                        <span>Latency: <b id="latency">0ms</b></span>
                        <span>Confidence: <b id="confLevel">0/100</b></span>
                    </div>
                    <div class="button-group">
                        <button class="btn-report" onclick="copyResult()">📋 Copy Report</button>
                        <button class="btn-report-it" onclick="reportToIT()">⚠️ Report to IT</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
